{{ $id := printf "tabs-%d" now.UnixNano }}
<div class="tabs-component not-prose" id="{{ $id }}">
  <div class="tabs-inner">{{ .Inner }}</div>
</div>
<script>
(function() {
  const container = document.getElementById('{{ $id }}');
  if (!container) return;
  const inner = container.querySelector('.tabs-inner');
  const panels = Array.from(inner.querySelectorAll('.tab-panel'));
  if (!panels.length) return;

  const header = document.createElement('div');
  header.className = 'tabs-header';

  panels.forEach(function(panel, i) {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
    btn.textContent = panel.dataset.tabLabel;
    btn.dataset.index = i;
    header.appendChild(btn);
    panel.style.display = i === 0 ? '' : 'none';
  });

  container.insertBefore(header, inner);

  header.addEventListener('click', function(e) {
    const btn = e.target.closest('.tab-btn');
    if (!btn) return;
    const idx = parseInt(btn.dataset.index, 10);
    header.querySelectorAll('.tab-btn').forEach(function(b, i) {
      b.classList.toggle('active', i === idx);
    });
    panels.forEach(function(panel, i) {
      panel.style.display = i === idx ? '' : 'none';
    });
  });
})();
</script>
