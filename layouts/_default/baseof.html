<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} - {{ .Site.Title }}{{ end }}</title>
        
        <!-- Favicon here-->
        <link rel="apple-touch-icon" sizes="180x180" href="{{ .Site.BaseURL }}favicon_io/apple-touch-icon.png">
        <link rel="icon" type="image/png" sizes="32x32" href="{{ .Site.BaseURL }}favicon_io/favicon-32x32.png">
        <link rel="icon" type="image/png" sizes="16x16" href="{{ .Site.BaseURL }}favicon_io/favicon-16x16.png">
        <link rel="manifest" href="{{ .Site.BaseURL }}favicon_io/site.webmanifest">        
        <link rel="preload" href="https://cdn.tailwindcss.com" as="script">
        <link rel="preload" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css" as="style">            
        <style>
            html, body {
                background-color: #FFFFFF; 
                color: #1f2937; 
            }
            html.dark, html.dark body {
                background-color: #121212; 
                color: #f3f4f6; 
            }
            .border { 
                border-color: #d4d4d8; 
            }
            html.dark .border {
                border-color: #374151; 
            }
            .carousel-item {
                display: inline-block;
                margin: 0 1rem;
            }            
            .flex {
                display: flex;
            }
            .flex-col {
                flex-direction: column;
            }
            
            @media (min-width: 768px) {
                .md\:flex-row {
                    flex-direction: row;
                }
            }
            
            .tech-carousel {
                overflow: hidden;
                width: 100%;
                padding: 1rem 0;
            }
            
            .carousel-track {
                white-space: nowrap;
            }
        </style>
        
        <script src="https://cdn.tailwindcss.com"></script>
        <link rel="stylesheet" type='text/css' href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css" />
        <script>
            if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        </script>
        <style>
            :root {
                color-scheme: light dark;
            }
            
            .tech-icon {
                filter: grayscale(100%) brightness(200%);
                transition: all 0.3s ease;
            }
            .tech-icon:hover {
                filter: none;
            }
            
            @keyframes scroll {
                0% {
                    transform: translateX(0);
                }
                100% {
                    transform: translateX(-100%);
                }
            }
            
            .tech-carousel {
                width: 100%;
                padding: 1rem 0;
            }
            
            .tech-track {
                width: fit-content;
                animation: scroll 20s linear infinite;
            }
            
            .tech-track:hover {
                animation-play-state: paused;
            }
            
            .tech-slide {
                float: left;
            }

            /* ── Code block — thème Aurora X ── */
            .ide-wrapper {
                position: relative; margin: 1.5rem 0;
                border-radius: 0.6rem; overflow: hidden;
                background: #07090f; border: 1px solid rgba(255,255,255,0.07);
            }
            .ide-header {
                position: absolute; top: 0.5rem; right: 0.6rem;
                display: flex; align-items: center;
                padding: 0; background: transparent; border: none; z-index: 2;
            }
            .ide-header-left, .ide-lang, .ide-lang-icon { display: none; }
            .ide-copy {
                display: flex; align-items: center; justify-content: center;
                width: 26px; height: 26px; border-radius: 5px;
                border: 1px solid rgba(255,255,255,0.15);
                background: rgba(7,9,15,0.8); color: rgba(255,255,255,0.4);
                cursor: pointer; transition: all 0.15s ease; opacity: 0;
            }
            .ide-wrapper:hover .ide-copy { opacity: 1; }
            .ide-copy:hover { background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.9); border-color: rgba(255,255,255,0.3); }
            .ide-copy.copied { opacity: 1; background: #3fb950; color: #fff; border-color: #3fb950; }
            .ide-copy svg { flex-shrink: 0; }
            .ide-wrapper pre {
                padding: 1.1rem 1.25rem; overflow-x: auto;
                margin: 0; border: none; background: transparent;
            }
            .ide-wrapper pre[class*="language-"] { background: transparent; margin: 0; padding: 1.1rem 1.25rem; }
            .ide-wrapper code[class*="language-"] { background: transparent; }
            .ide-wrapper pre code {
                padding: 0; background: transparent !important;
                font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
                font-size: 0.84rem; line-height: 1.75; color: #c5cdd9;
            }
            .ide-wrapper pre code .token { background: transparent !important; }
            /* Aurora X tokens */
            .ide-wrapper .token.comment,.ide-wrapper .token.prolog,
            .ide-wrapper .token.doctype,.ide-wrapper .token.cdata { color: #8b949e; font-style: italic; }
            .ide-wrapper .token.keyword,.ide-wrapper .token.tag,
            .ide-wrapper .token.selector,.ide-wrapper .token.rule,
            .ide-wrapper .token.important,.ide-wrapper .token.atrule { color: #e6a0d0; }
            .ide-wrapper .token.string,.ide-wrapper .token.attr-value,
            .ide-wrapper .token.char,.ide-wrapper .token.regex { color: #96c5f7; }
            .ide-wrapper .token.number,.ide-wrapper .token.boolean,
            .ide-wrapper .token.constant { color: #f0883e; }
            .ide-wrapper .token.function,.ide-wrapper .token.function-name { color: #79b8ff; }
            .ide-wrapper .token.class-name,.ide-wrapper .token.builtin { color: #ffa657; }
            .ide-wrapper .token.attr-name,.ide-wrapper .token.property { color: #79b8ff; }
            .ide-wrapper .token.operator,.ide-wrapper .token.entity,
            .ide-wrapper .token.url { color: #ff7b72; }
            .ide-wrapper .token.punctuation { color: #8b949e; }
            .ide-wrapper .token.variable,.ide-wrapper .token.symbol { color: #c9d1d9; }
            .ide-wrapper .token.inserted { color: #3fb950; }
            .ide-wrapper .token.deleted { color: #f85149; }
            .ide-wrapper .token.bold { font-weight: bold; }
            .ide-wrapper .token.italic { font-style: italic; }

            /* ── Tabs shortcode ── */
            .tabs-component { margin: 1.5rem 0; }

            .tabs-header {
                display: flex;
                gap: 0;
                border-bottom: 2px solid #374151;
                margin-bottom: 0;
                flex-wrap: wrap;
            }

            .tab-btn {
                padding: 0.5rem 1.1rem;
                font-size: 0.82rem;
                font-weight: 600;
                border: none;
                background: transparent;
                cursor: pointer;
                color: #9ca3af;
                border-bottom: 2px solid transparent;
                margin-bottom: -2px;
                transition: color 0.15s, border-color 0.15s;
                font-family: inherit;
            }
            .tab-btn:hover { color: #e5e7eb; }
            .tab-btn.active {
                color: #f3f4f6;
                border-bottom-color: #3b82f6;
            }
            html:not(.dark) .tab-btn { color: #6b7280; }
            html:not(.dark) .tab-btn:hover { color: #111827; }
            html:not(.dark) .tab-btn.active {
                color: #111827;
                border-bottom-color: #2563eb;
            }
            html:not(.dark) .tabs-header { border-bottom-color: #d1d5db; }

            .tab-panel {
                background: #1e1e2e;
                border: 1px solid #374151;
                border-top: none;
                border-radius: 0 0 0.5rem 0.5rem;
                padding: 1rem 1.25rem;
            }
            html:not(.dark) .tab-panel {
                background: #f8fafc;
                border-color: #d1d5db;
            }
            .tab-panel pre {
                margin: 0 !important;
                background: transparent !important;
                padding: 0 !important;
            }
            .tab-panel code { font-size: 0.82rem; }
            .tab-copy-btn {
                position: absolute; top: 0.5rem; right: 0.5rem;
                display: flex; align-items: center; gap: 5px;
                padding: 4px 10px; border-radius: 6px;
                border: 1px solid rgba(255,255,255,0.12);
                background: rgba(255,255,255,0.06);
                color: rgba(255,255,255,0.55);
                font-size: 0.7rem; font-weight: 500;
                cursor: pointer; transition: all 0.2s ease;
            }
            html:not(.dark) .tab-copy-btn {
                border-color: rgba(0,0,0,0.12);
                background: rgba(0,0,0,0.04);
                color: rgba(0,0,0,0.45);
            }
            .tab-copy-btn:hover { background: rgba(255,255,255,0.14); color: #e0e0e0; }
            html:not(.dark) .tab-copy-btn:hover { background: rgba(0,0,0,0.1); color: #111; }
            .tab-copy-btn.copied { background: #28c840; color: #fff; border-color: #28c840; }
        </style>
    </head>
    <body class="min-h-screen bg-bg-primary-light dark:bg-bg-primary-dark text-text-primary-light dark:text-text-primary-dark">
        {{ partial "header" . }}
        <main>
            {{ block "main" . }}{{ end }}
        </main>
        {{ partial "footer" . }}
        {{ partial "assistant-widget" . }}

        <!-- Prism.js — syntax highlighting (300+ langages, autoloader) -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" id="prism-dark-theme" disabled>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism.min.css" id="prism-light-theme" disabled>
        <script>window.Prism = window.Prism || {}; Prism.manual = true;</script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>

        <!-- Code block universal script (Andromeeda theme) -->
        <script>
        (function() {
            var copyIcon  = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>';
            var checkIcon = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>';

            document.addEventListener('DOMContentLoaded', function() {
                var allPres = document.querySelectorAll('pre');
                for (var i = 0; i < allPres.length; i++) {
                    (function(pre) {
                        // Skip if already wrapped or inside a tab/special container
                        if (pre.closest && (pre.closest('.ide-wrapper') || pre.closest('.tabs-component'))) return;
                        var code = pre.querySelector('code');
                        var lang = '';
                        if (code && code.className) {
                            var m = code.className.match(/language-(\w+)/);
                            if (m) lang = m[1].toLowerCase();
                        }
                        // Build wrapper
                        var wrapper = document.createElement('div');
                        wrapper.className = 'ide-wrapper';
                        var header = document.createElement('div');
                        header.className = 'ide-header';
                        var copyBtn = document.createElement('button');
                        copyBtn.type = 'button';
                        copyBtn.className = 'ide-copy';
                        copyBtn.setAttribute('aria-label', 'Copier');
                        copyBtn.innerHTML = copyIcon;
                        copyBtn.addEventListener('click', function() {
                            var text = code ? code.textContent : pre.textContent;
                            navigator.clipboard.writeText(text).then(function() {
                                copyBtn.classList.add('copied');
                                copyBtn.innerHTML = checkIcon;
                                setTimeout(function() { copyBtn.classList.remove('copied'); copyBtn.innerHTML = copyIcon; }, 2000);
                            });
                        });
                        header.appendChild(copyBtn);
                        wrapper.appendChild(header);
                        pre.parentNode.insertBefore(wrapper, pre);
                        wrapper.appendChild(pre);
                        // Highlight
                        if (code && window.Prism) {
                            if (lang) code.className = 'language-' + lang;
                            if (Prism.plugins && Prism.plugins.autoloader) {
                                Prism.plugins.autoloader.languages_path =
                                    'https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/';
                            }
                            try { Prism.highlightElement(code); } catch(e) {}
                        }
                    })(allPres[i]);
                }
            });
        })();
        </script>

        <!-- Vercel Analytics -->
        <script>
            window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
        </script>
        <script defer src="/_vercel/insights/script.js"></script>

        <!-- Vercel Speed Insights -->
        <script>
            window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
        </script>
        <script defer src="/_vercel/speed-insights/script.js"></script>
    </body>
</html>
